---
layout: default
---
<article class="page">
  {% if page.title %}
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.lead %}
        <p class="page-lead">{{ page.lead }}</p>
      {% endif %}
    </header>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>
</article>
