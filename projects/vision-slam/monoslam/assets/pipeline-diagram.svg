<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" fill="none">
  <rect width="960" height="260" fill="#FAFAF7"/>
  <style>
    .box { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 2; rx: 10; }
    .text { fill: #111827; font: 16px 'IBM Plex Sans', sans-serif; }
    .arrow { stroke: #4B5563; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4B5563"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="90" width="190" height="80"/>
  <text class="text" x="82" y="135">Feature Front-end</text>

  <rect class="box" x="280" y="90" width="190" height="80"/>
