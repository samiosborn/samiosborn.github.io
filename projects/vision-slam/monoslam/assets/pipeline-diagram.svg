  <rect class="box" x="760" y="90" width="160" height="80"/>
  <text class="text" x="794" y="135">Map Update</text>

  <line class="arrow" x1="230" y1="130" x2="270" y2="130"/>
  <line class="arrow" x1="470" y1="130" x2="510" y2="130"/>
  <line class="arrow" x1="710" y1="130" x2="750" y2="130"/>
</svg>
